<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tip Calc" />
  <meta name="theme-color" content="#2b1e3e" />
  <title>Tip Calculator</title>
  <!-- Home-screen icon: cosmic purple tile with a money emoji -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%232b1e3e'/%3E%3Ctext x='90' y='125' font-size='100' text-anchor='middle'%3E%F0%9F%92%B5%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --deep: #2b1e3e;      /* rich dark base */
      --cosmic: #4a4e8f;    /* mystical mid-tone */
      --lavender: #a490c2;  /* soft accent */
      --silver: #e6e6fa;    /* light text */
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "FreeSans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #3a2b52 0%, #201631 55%, #150e21 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
      color: var(--silver);
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: linear-gradient(180deg, rgba(43,30,62,.96), rgba(30,21,45,.96));
      border: 1px solid rgba(164,144,194,.25);
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(10,6,20,.6), 0 0 0 1px rgba(164,144,194,.06);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, var(--cosmic), #6a5aa0);
      padding: 22px 24px;
      position: relative;
    }
    .header::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(300px 120px at 85% -30%, rgba(230,230,250,.28), transparent 70%);
      pointer-events: none;
    }
    .header h1 { color: #fff; font-size: 23px; margin: 0; letter-spacing: .3px; font-weight: 800; }
    .header p { color: #d9d4f2; font-size: 13px; margin: 5px 0 0; }
    .body { padding: 22px 24px; }
    .field { margin-bottom: 18px; }
    label.lbl { display: block; font-size: 13px; font-weight: 600; color: var(--lavender); margin-bottom: 7px; letter-spacing: .3px; text-transform: uppercase; }
    .inwrap { position: relative; }
    input[type=number] {
      width: 100%; padding: 12px 12px; font-size: 17px;
      background: rgba(20,14,32,.7);
      border: 1px solid rgba(164,144,194,.3); border-radius: 12px; outline: none;
      color: var(--silver);
    }
    input[type=number]::placeholder { color: #8479a0; }
    input[type=number]:focus { border-color: var(--lavender); box-shadow: 0 0 0 3px rgba(164,144,194,.25); }
    .prefix { padding-left: 26px !important; }
    .suffix { padding-right: 30px !important; }
    .sym { position: absolute; top: 50%; transform: translateY(-50%); color: var(--lavender); }
    .sym.l { left: 12px; } .sym.r { right: 12px; }
    .grid { display: grid; gap: 8px; }
    .g4 { grid-template-columns: repeat(4, 1fr); }
    .g3 { grid-template-columns: repeat(3, 1fr); }
    .chip {
      padding: 11px 0; border-radius: 11px; font-size: 14px; font-weight: 700;
      border: 1px solid rgba(164,144,194,.3); background: rgba(20,14,32,.5); color: var(--silver); cursor: pointer;
      transition: all .15s ease;
    }
    .chip.sm { font-size: 12px; }
    .chip:hover { border-color: var(--lavender); }
    .chip.active {
      background: linear-gradient(135deg, var(--cosmic), #7a68b4);
      color: #fff; border-color: transparent;
      box-shadow: 0 4px 14px rgba(74,78,143,.5);
    }
    .checkrow { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 14px; color: #c9c1e0; }
    .checkrow input { width: 18px; height: 18px; accent-color: var(--lavender); }
    .stepper { display: flex; align-items: center; gap: 12px; }
    .step {
      width: 46px; height: 46px; border-radius: 12px; border: 1px solid rgba(164,144,194,.3);
      background: rgba(20,14,32,.6); color: var(--silver); font-size: 22px; font-weight: 700; cursor: pointer;
    }
    .step:hover { border-color: var(--lavender); }
    .count { flex: 1; text-align: center; font-size: 17px; font-weight: 600; color: var(--silver); }
    .results { background: rgba(20,14,32,.55); border: 1px solid rgba(164,144,194,.18); border-radius: 16px; padding: 16px; margin-top: 4px; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
    .row .k { color: #b3a9cf; font-size: 14px; } .row .v { color: var(--silver); font-size: 14px; font-weight: 500; }
    .row.total .k { color: #fff; font-size: 16px; font-weight: 700; }
    .row.total .v { color: #fff; font-size: 19px; font-weight: 800; }
    .divider { height: 1px; background: rgba(164,144,194,.25); margin: 9px 0; }
    .perperson {
      margin-top: 12px; border-radius: 12px;
      background: linear-gradient(135deg, var(--cosmic), #7a68b4);
      box-shadow: 0 6px 18px rgba(74,78,143,.45);
      padding: 13px 16px; display: flex; justify-content: space-between; align-items: center;
    }
    .perperson .k { color: #e3def5; font-size: 14px; }
    .perperson .v { color: #fff; font-size: 26px; font-weight: 800; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Tip Calculator</h1>
      <p>Split the bill without the mental math.</p>
    </div>
    <div class="body">
      <div class="field">
        <label class="lbl">Bill amount (pre-tax)</label>
        <div class="inwrap">
          <span class="sym l">$</span>
          <input id="bill" class="prefix" type="number" inputmode="decimal" min="0" placeholder="0.00" />
        </div>
      </div>

      <div class="field">
        <label class="lbl">Tax rate (optional)</label>
        <div class="inwrap">
          <input id="tax" class="suffix" type="number" inputmode="decimal" min="0" placeholder="0" />
          <span class="sym r">%</span>
        </div>
        <label class="checkrow"><input id="posttax" type="checkbox" /> Tip on the post-tax amount</label>
      </div>

      <div class="field">
        <label class="lbl">Tip</label>
        <div class="grid g4" id="tipChips"></div>
        <div class="inwrap" style="margin-top:8px">
          <input id="customTip" class="suffix" type="number" inputmode="decimal" min="0" placeholder="Custom %" />
          <span class="sym r">%</span>
        </div>
      </div>

      <div class="field">
        <label class="lbl">Split between</label>
        <div class="stepper">
          <button class="step" id="minus">&minus;</button>
          <div class="count" id="count">1 person</div>
          <button class="step" id="plus">+</button>
        </div>
      </div>

      <div class="field">
        <label class="lbl">Rounding</label>
        <div class="grid g3" id="roundChips"></div>
      </div>

      <div class="results">
        <div class="row"><span class="k">Subtotal</span><span class="v" id="rSub">$0.00</span></div>
        <div class="row" id="rTaxRow"><span class="k">Tax</span><span class="v" id="rTax">$0.00</span></div>
        <div class="row"><span class="k" id="rTipLbl">Tip</span><span class="v" id="rTip">$0.00</span></div>
        <div class="divider"></div>
        <div class="row total"><span class="k">Total</span><span class="v" id="rTotal">$0.00</span></div>
        <div class="perperson" id="ppBox" style="display:none">
          <span class="k">Each person pays</span><span class="v" id="rPP">$0.00</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TIP_PRESETS = [15, 18, 20, 25];
    const state = { bill: "", tax: "", tipPct: 20, customTip: "", postTax: false, people: 1, rounding: "none" };

    const tipChips = document.getElementById("tipChips");
    TIP_PRESETS.forEach(p => {
      const b = document.createElement("button");
      b.className = "chip"; b.textContent = p + "%"; b.dataset.p = p;
      b.onclick = () => { state.tipPct = p; state.customTip = ""; document.getElementById("customTip").value = ""; render(); };
      tipChips.appendChild(b);
    });

    const roundOpts = [ ["none","None"], ["total","Up: total"], ["person","Up: person"] ];
    const roundChips = document.getElementById("roundChips");
    roundOpts.forEach(([id,label]) => {
      const b = document.createElement("button");
      b.className = "chip sm"; b.textContent = label; b.dataset.id = id;
      b.onclick = () => { state.rounding = id; render(); };
      roundChips.appendChild(b);
    });

    document.getElementById("bill").oninput = e => { state.bill = e.target.value; render(); };
    document.getElementById("tax").oninput = e => { state.tax = e.target.value; render(); };
    document.getElementById("customTip").oninput = e => { state.customTip = e.target.value; render(); };
    document.getElementById("posttax").onchange = e => { state.postTax = e.target.checked; render(); };
    document.getElementById("minus").onclick = () => { state.people = Math.max(1, state.people - 1); render(); };
    document.getElementById("plus").onclick = () => { state.people = Math.min(50, state.people + 1); render(); };

    const money = v => "$" + (isFinite(v) ? v : 0).toFixed(2);

    function render() {
      const subtotal = Math.max(0, parseFloat(state.bill) || 0);
      const taxRate = Math.max(0, parseFloat(state.tax) || 0) / 100;
      const tax = subtotal * taxRate;
      const activeTip = state.customTip !== "" ? Math.max(0, parseFloat(state.customTip) || 0) : state.tipPct;
      const tipBase = state.postTax ? subtotal + tax : subtotal;
      let tip = tipBase * (activeTip / 100);
      let total = subtotal + tax + tip;
      const n = Math.max(1, Math.floor(state.people) || 1);

      if (state.rounding === "total") { const rd = Math.ceil(total); tip += rd - total; total = rd; }
      else if (state.rounding === "person") { const pp = Math.ceil(total / n); const rd = pp * n; tip += rd - total; total = rd; }

      [...tipChips.children].forEach(c => c.classList.toggle("active", state.customTip === "" && +c.dataset.p === state.tipPct));
      [...roundChips.children].forEach(c => c.classList.toggle("active", c.dataset.id === state.rounding));

      document.getElementById("count").textContent = n + (n === 1 ? " person" : " people");
      document.getElementById("rSub").textContent = money(subtotal);
      document.getElementById("rTaxRow").style.display = tax > 0 ? "flex" : "none";
      document.getElementById("rTax").textContent = money(tax);
      document.getElementById("rTipLbl").textContent = "Tip (" + activeTip + "%)";
      document.getElementById("rTip").textContent = money(tip);
      document.getElementById("rTotal").textContent = money(total);
      const ppBox = document.getElementById("ppBox");
      ppBox.style.display = n > 1 ? "flex" : "none";
      document.getElementById("rPP").textContent = money(total / n);
    }

    render();
  </script>
</body>
</html>
